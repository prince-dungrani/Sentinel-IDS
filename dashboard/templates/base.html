<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Platform | Network IDS</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark-theme">

    <div class="d-flex" id="wrapper">
        
        <!-- Sidebar -->
        <div class="sidebar text-white" id="sidebar-wrapper">
            <div class="sidebar-heading border-bottom p-3 text-center mb-3">
                <i class="fa-solid fa-shield-halved fa-2x text-primary mb-2"></i><br>
                <span class="fs-5 fw-bold tracking-wide">SOC<span class="text-primary">PLATFORM</span></span>
            </div>
            <div class="list-group list-group-flush px-2">
                <a href="{{ url_for('dashboard_overview') }}" class="list-group-item list-group-item-action py-3 {% if active_page == 'dashboard' %}active{% endif %}">
                    <i class="fa-solid fa-chart-pie me-2"></i> Analytics
                </a>
                <a href="{{ url_for('alerts_view') }}" class="list-group-item list-group-item-action py-3 {% if active_page == 'alerts' %}active{% endif %}">
                    <i class="fa-solid fa-triangle-exclamation me-2"></i> Event Monitoring
                </a>
                <a href="{{ url_for('threat_intel_view') }}" class="list-group-item list-group-item-action py-3 {% if active_page == 'intel' %}active{% endif %}">
                    <i class="fa-solid fa-globe-crosshairs me-2"></i> Threat Intelligence
                </a>
                <a href="{{ url_for('rules_view') }}" class="list-group-item list-group-item-action py-3 {% if active_page == 'rules' %}active{% endif %}">
                    <i class="fa-solid fa-book-skull me-2"></i> Rule Management
                </a>
                <a href="{{ url_for('settings_view') }}" class="list-group-item list-group-item-action py-3 {% if active_page == 'settings' %}active{% endif %}">
                    <i class="fa-solid fa-gear me-2"></i> Settings
                </a>
            </div>
            
            <div class="position-absolute bottom-0 w-100 p-3 border-top border-secondary text-light small text-center">
                Engine: <span class="text-success fw-bold"><i class="fa-solid fa-circle fa-2xs pulse-anim"></i> Online</span>
            </div>
        </div>
        <!-- /#sidebar-wrapper -->

        <!-- Page Content -->
        <div id="page-content-wrapper" class="w-100 flex-grow-1">
            <nav class="navbar navbar-expand-lg border-bottom px-4 top-navbar">
                <div class="container-fluid">
                    <button class="btn btn-outline-secondary d-md-none me-3" id="menu-toggle"><i class="fa-solid fa-bars"></i></button>
                    
                    <span class="navbar-brand mb-0 h1 fs-4 text-white">
                        {% block header_title %}Overview{% endblock %}
                    </span>
                    
                    <div class="ms-auto d-flex align-items-center">
                        <div class="position-relative me-4">
                            <i class="fa-solid fa-bell fs-5 text-light"></i>
                            <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle" style="width: 10px; height: 10px;">
                                <span class="visually-hidden">New alerts</span>
                            </span>
                        </div>
                        <div class="d-flex align-items-center">
                            <img src="https://ui-avatars.com/api/?name=SOC+Analyst&background=0D8ABC&color=fff" alt="Admin" class="rounded-circle me-2" width="35" height="35">
                            <span class="text-white">SOC Analyst</span>
                        </div>
                    </div>
                </div>
            </nav>

            <div class="container-fluid px-4 py-4 main-content-area">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.getElementById("menu-toggle").addEventListener("click", function(e) {
            e.preventDefault();
            document.getElementById("wrapper").classList.toggle("toggled");
        });
    </script>
    
    {% block scripts %}{% endblock %}

</body>
</html>
